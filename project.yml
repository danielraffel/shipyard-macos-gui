name: ShipyardMenuBar
options:
  bundleIdPrefix: com.danielraffel
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "26.0"
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: 95CX6P84C4
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application: Daniel Raffel (95CX6P84C4)"
    ENABLE_HARDENED_RUNTIME: YES
    OTHER_CODE_SIGN_FLAGS: "--timestamp"
    SWIFT_STRICT_CONCURRENCY: minimal
    CLANG_ENABLE_MODULES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  ShipyardMenuBar:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources/ShipyardMenuBar
    resources:
      - path: Resources/Assets.xcassets
        optional: true
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: Shipyard
        CFBundleDisplayName: Shipyard
        CFBundleIdentifier: com.danielraffel.shipyard.menubar
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHumanReadableCopyright: "© 2026 Daniel Raffel"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
    entitlements:
      path: Resources/ShipyardMenuBar.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.inherit: false
    settings:
      base:
        PRODUCT_NAME: Shipyard
        PRODUCT_BUNDLE_IDENTIFIER: com.danielraffel.shipyard.menubar
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MACOSX_DEPLOYMENT_TARGET: "13.0"
