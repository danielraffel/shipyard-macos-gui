name: ShipyardMenuBar
options:
  bundleIdPrefix: com.danielraffel
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "26.0"
  groupSortPosition: top
packages:
  # Sparkle 2.x for built-in auto-update. Verifies with EdDSA
  # signatures (Sparkle 1 DSA is gone in 2.x). Integrates via SPM.
  # Pinning to a minor-version range so a 2.x → 3.x rewrite doesn't
  # silently break our appcast format.
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
settings:
  base:
    MARKETING_VERSION: 0.1.11
    CURRENT_PROJECT_VERSION: 12
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: 95CX6P84C4
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application: Daniel Raffel (95CX6P84C4)"
    ENABLE_HARDENED_RUNTIME: YES
    OTHER_CODE_SIGN_FLAGS: "--timestamp"
    SWIFT_STRICT_CONCURRENCY: minimal
    CLANG_ENABLE_MODULES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  ShipyardMenuBarTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Tests/ShipyardMenuBarTests
    dependencies:
      - target: ShipyardMenuBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.danielraffel.shipyard.menubar.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Shipyard.app/Contents/MacOS/Shipyard"
        BUNDLE_LOADER: "$(TEST_HOST)"
        # Match the host app's signing so the test bundle loads into it.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application: Daniel Raffel (95CX6P84C4)"
        DEVELOPMENT_TEAM: 95CX6P84C4
        ENABLE_HARDENED_RUNTIME: NO

  ShipyardMenuBar:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    dependencies:
      - package: Sparkle
    sources:
      - path: Sources/ShipyardMenuBar
      # The asset catalog lives under sources (not resources) so
      # xcodegen emits it with the right type (folder.assetcatalog)
      # and Xcode runs actool to compile it into Assets.car. Listing
      # it under `resources` made Xcode treat it as a plain folder
      # and skip the compile step — the built app shipped with no
      # Assets.car and the Dock/Finder fell back to the default
      # generic icon.
      - path: Resources/Assets.xcassets
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: Shipyard
        CFBundleDisplayName: Shipyard
        CFBundleIdentifier: com.danielraffel.shipyard.menubar
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundlePackageType: APPL
        # Modern macOS reads CFBundleIconName and looks up "AppIcon"
        # from the compiled Assets.car. CFBundleIconFile is the
        # legacy fallback some contexts still honor (Dock caches,
        # older Finder). Having both is the safe belt-and-suspenders.
        CFBundleIconName: AppIcon
        CFBundleIconFile: AppIcon
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHumanReadableCopyright: "© 2026 Daniel Raffel"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
        # Sparkle auto-update. Feed URL uses GitHub's stable
        # `/latest/download/<asset>` redirect so every release
        # automatically becomes the "latest" one users resolve — no
        # DNS or CDN in the middle. SUPublicEDKey is the EdDSA
        # public half of the keypair; the private half lives at
        # `~/.config/shipyard-macos-gui-sparkle.key` (git-ignored)
        # and is read only by scripts/release.sh to sign each DMG
        # with `sign_update`. Sparkle refuses to install any update
        # whose signature doesn't verify against this key.
        SUFeedURL: https://github.com/danielraffel/shipyard-macos-gui/releases/latest/download/appcast.xml
        # EdDSA public key. Corresponds to the private key stored in
        # the user's macOS Keychain under "https://sparkle-project.org"
        # account "ed25519". Run `generate_keys` (Sparkle tool in the
        # SPM artifacts dir) to regenerate / print.
        SUPublicEDKey: A/1JcspAs19gjff6/VQabIVYG5UQgHa/bvXCKqzxI9U=
        # Check automatically once per day; user can also pick
        # "Check for Updates…" from the status-item menu on demand.
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    entitlements:
      path: Resources/ShipyardMenuBar.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.inherit: false
    settings:
      base:
        PRODUCT_NAME: Shipyard
        PRODUCT_BUNDLE_IDENTIFIER: com.danielraffel.shipyard.menubar
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MACOSX_DEPLOYMENT_TARGET: "13.0"
